<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dünya Kupası Tahmin Ligi</title>
<style>
  :root{
    --bg:#0b1220; --card:#141d33; --card2:#1b2742; --line:#27324f;
    --txt:#eaf0fb; --muted:#93a0bd; --accent:#19c37d; --accent2:#3b82f6;
    --gold:#f5c518; --red:#ef4444; --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(180deg,#0b1220,#0e1729);color:var(--txt);min-height:100vh}
  .wrap{max-width:560px;margin:0 auto;padding:0 14px 90px}
  header{position:sticky;top:0;z-index:20;backdrop-filter:blur(10px);
    background:rgba(11,18,32,.85);border-bottom:1px solid var(--line);padding:14px 14px 12px}
  .hwrap{max-width:560px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;letter-spacing:.2px}
  .brand .ball{width:26px;height:26px;background:var(--accent);border-radius:50%;display:grid;place-items:center;font-size:15px}
  .me{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px}
  .me b{color:var(--txt)}
  .logout{background:none;border:1px solid var(--line);color:var(--muted);padding:5px 9px;border-radius:9px;font-size:12px;cursor:pointer}
  .sync{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--accent);margin-top:8px}
  .sync .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 0 rgba(25,195,125,.6);animation:pulse 2s infinite}
  .sync.off{color:var(--muted)} .sync.off .dot{background:var(--muted);animation:none}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(25,195,125,.5)}70%{box-shadow:0 0 0 6px rgba(25,195,125,0)}100%{box-shadow:0 0 0 0 rgba(25,195,125,0)}}

  .tabs{position:fixed;bottom:0;left:0;right:0;z-index:30;background:rgba(13,21,38,.95);
    backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex}
  .tabs .inner{max-width:560px;margin:0 auto;display:flex;width:100%}
  .tab{flex:1;background:none;border:none;color:var(--muted);padding:11px 0 14px;font-size:11px;
    display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;font-family:inherit}
  .tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.9}
  .tab.active{color:var(--accent)}

  .day{margin:18px 2px 8px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:12px}
  .mtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .grp{font-size:11px;color:var(--muted);background:var(--card2);padding:3px 8px;border-radius:7px}
  .status-pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
  .s-open{background:rgba(25,195,125,.15);color:var(--accent)}
  .s-live{background:rgba(239,68,68,.18);color:#ff7b7b}
  .s-done{background:rgba(147,160,189,.15);color:var(--muted)}

  .teams{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .team{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
  .team .flag{font-size:34px;line-height:1}
  .team .name{font-size:13px;font-weight:600}
  .mid{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:96px}
  .pred-inputs{display:flex;align-items:center;gap:6px}
  .pred-inputs input{width:42px;height:46px;text-align:center;font-size:20px;font-weight:800;
    background:var(--card2);border:1.5px solid var(--line);border-radius:11px;color:var(--txt);outline:none}
  .pred-inputs input:focus{border-color:var(--accent)}
  .pred-inputs span{font-size:18px;color:var(--muted);font-weight:700}
  .finalscore{font-size:24px;font-weight:800;letter-spacing:1px}
  .finalscore small{font-size:11px;color:var(--muted);display:block;font-weight:600;letter-spacing:0}

  .odds{display:flex;gap:6px;margin-top:13px}
  .odd{flex:1;background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:7px 4px;text-align:center}
  .odd .lab{font-size:10px;color:var(--muted)}
  .odd .val{font-size:13px;font-weight:700;margin-top:2px}

  .saverow{display:flex;gap:8px;margin-top:12px;align-items:center}
  .btn{background:var(--accent);color:#06231a;border:none;border-radius:11px;padding:11px 16px;
    font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;flex:1}
  .btn:active{transform:scale(.98)} .btn:disabled{opacity:.5}
  .btn.sec{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
  .saved-note{font-size:12px;color:var(--accent);display:flex;align-items:center;gap:5px;white-space:nowrap}
  .lock-note{font-size:12px;color:var(--muted);margin-top:11px;display:flex;align-items:center;gap:6px}

  .admin-box{margin-top:12px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.3);border-radius:11px;padding:11px}
  .admin-box .lab{font-size:11px;color:#7eb0ff;font-weight:700;margin-bottom:8px}
  .admin-row{display:flex;align-items:center;gap:8px}
  .admin-row input{width:46px;height:40px;text-align:center;font-size:17px;font-weight:800;background:var(--card2);border:1.5px solid var(--line);border-radius:9px;color:var(--txt);outline:none}
  .admin-row .btn{padding:9px 12px;font-size:13px;background:var(--accent2);color:#fff}

  .others{margin-top:13px;border-top:1px solid var(--line);padding-top:11px}
  .others h4{margin:0 0 9px;font-size:12px;color:var(--muted);font-weight:700;display:flex;justify-content:space-between}
  .prow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px;border-bottom:1px dashed var(--line)}
  .prow:last-child{border-bottom:none}
  .prow .who{display:flex;align-items:center;gap:8px}
  .ava{width:24px;height:24px;border-radius:50%;background:var(--accent2);display:grid;place-items:center;font-size:11px;font-weight:800;color:#fff}
  .prow .sc{font-weight:700}
  .pts{font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px;margin-left:8px}
  .p5{background:rgba(25,195,125,.18);color:var(--accent)}
  .p3{background:rgba(59,130,246,.18);color:#7eb0ff}
  .p0{background:rgba(147,160,189,.12);color:var(--muted)}

  .lb-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-top:6px}
  .lb-row{display:flex;align-items:center;gap:12px;padding:14px;border-bottom:1px solid var(--line)}
  .lb-row:last-child{border-bottom:none}
  .lb-row.meRow{background:rgba(25,195,125,.07)}
  .rank{width:26px;text-align:center;font-weight:800;font-size:15px;color:var(--muted)}
  .rank.r1{color:var(--gold)} .rank.r2{color:#cbd5e1} .rank.r3{color:#cd7f32}
  .lb-name{flex:1;font-weight:600;display:flex;align-items:center;gap:9px}
  .lb-pts{font-weight:800;font-size:16px}
  .lb-pts small{font-size:11px;color:var(--muted);font-weight:600}

  .rule{display:flex;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--line)}
  .rule:last-child{border-bottom:none}
  .rule .pt{font-weight:800;color:var(--accent)}

  .login{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;gap:18px}
  .login .logo{width:74px;height:74px;border-radius:22px;background:linear-gradient(135deg,var(--accent),#0f8f5b);
    display:grid;place-items:center;font-size:38px;box-shadow:0 12px 40px rgba(25,195,125,.3)}
  .login h1{margin:0;font-size:23px;text-align:center}
  .login p{margin:0;color:var(--muted);text-align:center;font-size:14px;max-width:300px}
  .login input{width:100%;max-width:320px;padding:14px;font-size:16px;background:var(--card);
    border:1.5px solid var(--line);border-radius:13px;color:var(--txt);outline:none;text-align:center}
  .login input:focus{border-color:var(--accent)}
  .login .btn{max-width:320px}
  .hidden{display:none!important}
  .sectitle{font-size:20px;font-weight:800;margin:18px 2px 4px}
  .sectitle + p{margin:0 2px 10px;color:var(--muted);font-size:13px}
  .toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);background:var(--accent);color:#06231a;
    padding:10px 18px;border-radius:30px;font-weight:700;font-size:13px;z-index:50;opacity:0;transition:.3s;pointer-events:none}
  .toast.show{opacity:1;bottom:88px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="logo">🏆</div>
  <h1>Dünya Kupası<br>Tahmin Ligi</h1>
  <p>Adını gir, maçları tahmin et, arkadaşlarınla yarış.</p>
  <input id="nameInput" placeholder="Adın (örn. Meriç)" autocomplete="off">
  <button class="btn" id="loginBtn">Giriş Yap</button>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header>
    <div class="hwrap">
      <div class="brand"><span class="ball">⚽</span> DK Tahmin Ligi</div>
      <div class="me"><span>Merhaba, <b id="meName"></b></span>
        <button class="logout" id="logoutBtn">Çıkış</button></div>
    </div>
    <div class="hwrap"><span class="sync off" id="sync"><span class="dot"></span> bağlanıyor…</span></div>
  </header>

  <div class="wrap">
    <div id="view-matches"></div>
    <div id="view-board" class="hidden"></div>
    <div id="view-rules" class="hidden"></div>
  </div>

  <nav class="tabs"><div class="inner">
    <button class="tab active" data-v="matches">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>Maçlar</button>
    <button class="tab" data-v="board">
      <svg viewBox="0 0 24 24"><path d="M8 21h8M12 17v4M5 4h14v5a7 7 0 01-14 0z"/><path d="M5 6H3v2a3 3 0 003 3M19 6h2v2a3 3 0 01-3 3"/></svg>Sıralama</button>
    <button class="tab" data-v="rules">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h9"/></svg>Kurallar</button>
  </div></nav>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ============================================================
   1) FIREBASE
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyAbeNEfOCgwBHqzXEXat6szSxF-o5doYN0",
  authDomain: "fantasyfootbalgame.firebaseapp.com",
  projectId: "fantasyfootbalgame",
  storageBucket: "fantasyfootbalgame.firebasestorage.app",
  messagingSenderId: "830281167704",
  appId: "1:830281167704:web:ecc751710ec2d880d62b2d"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ============================================================
   2) AYARLAR — puanlama, admin ve maçlar burada
   ============================================================ */
const CONFIG = {
  // Puanlama (istediğin gibi değiştir)
  points: { exactScore: 5, correctResult: 3, wrong: 0 },
  // Sonuç girebilecek yöneticiler (büyük/küçük harf önemsiz)
  admins: ["Meriç"],
};

// Maç fikstürü + referans oranlar.
// (Sonra The Odds API'den otomatik çekebiliriz; şimdilik elle.)
const matches = [
  { id:"m1", group:"A Grubu", home:"Meksika", hf:"🇲🇽", away:"Polonya", af:"🇵🇱",
    datetime:"2026-06-11T20:00:00", odds:{h:"1.95",d:"3.40",a:"3.80"} },
  { id:"m2", group:"B Grubu", home:"İspanya", hf:"🇪🇸", away:"Fas", af:"🇲🇦",
    datetime:"2026-06-12T18:00:00", odds:{h:"1.55",d:"4.00",a:"6.00"} },
  { id:"m3", group:"C Grubu", home:"Arjantin", hf:"🇦🇷", away:"Hırvatistan", af:"🇭🇷",
    datetime:"2026-06-13T21:00:00", odds:{h:"1.80",d:"3.50",a:"4.20"} },
  { id:"m4", group:"D Grubu", home:"Fransa", hf:"🇫🇷", away:"Senegal", af:"🇸🇳",
    datetime:"2026-06-15T20:00:00", odds:{h:"1.40",d:"4.50",a:"7.50"} },
  { id:"m5", group:"E Grubu", home:"Almanya", hf:"🇩🇪", away:"Japonya", af:"🇯🇵",
    datetime:"2026-06-16T18:00:00", odds:{h:"1.75",d:"3.70",a:"4.40"} },
  { id:"m6", group:"F Grubu", home:"Brezilya", hf:"🇧🇷", away:"Portekiz", af:"🇵🇹",
    datetime:"2026-06-17T21:00:00", odds:{h:"2.30",d:"3.30",a:"3.00"} },
];

/* ============================================================
   3) DURUM
   ============================================================ */
let me = localStorage.getItem("dk_user") || "";
let predictionsAll = {};  // { userName: {name, preds:{matchId:{h,a}}} }
let resultsAll = {};      // { matchId: {h,a} }
const isAdmin = () => CONFIG.admins.some(a => a.toLocaleLowerCase("tr")===me.toLocaleLowerCase("tr"));

function myPreds(){ return (predictionsAll[me] && predictionsAll[me].preds) || {}; }
function statusOf(m){
  if(resultsAll[m.id]) return "done";
  if(new Date() >= new Date(m.datetime)) return "live";
  return "open";
}
function fmtDate(iso){
  const d=new Date(iso);
  return d.toLocaleDateString("tr-TR",{day:"numeric",month:"long",weekday:"short"})+" · "+
         d.toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"});
}
function calcPoints(pred,res){
  if(!pred||!res) return null;
  if(pred.h===res.h && pred.a===res.a) return CONFIG.points.exactScore;
  if(Math.sign(pred.h-pred.a)===Math.sign(res.h-res.a)) return CONFIG.points.correctResult;
  return CONFIG.points.wrong;
}
const ptsClass = p => p===CONFIG.points.exactScore?"p5":p===CONFIG.points.correctResult?"p3":"p0";

/* ============================================================
   4) GİRİŞ
   ============================================================ */
const $ = id => document.getElementById(id);
function start(){
  $("login").classList.add("hidden");
  $("app").classList.remove("hidden");
  $("meName").textContent = me;
  subscribe();
  renderAll();
}
$("loginBtn").onclick = ()=>{
  const v=$("nameInput").value.trim();
  if(!v){ $("nameInput").focus(); return; }
  me=v; localStorage.setItem("dk_user",me); start();
};
$("nameInput").addEventListener("keydown",e=>{ if(e.key==="Enter") $("loginBtn").click(); });
$("logoutBtn").onclick = ()=>{ localStorage.removeItem("dk_user"); location.reload(); };

/* ============================================================
   5) CANLI SENKRON (Firestore)
   ============================================================ */
function subscribe(){
  onSnapshot(collection(db,"predictions"), snap=>{
    predictionsAll={}; snap.forEach(d=>predictionsAll[d.id]=d.data());
    setSync(true); renderMatches(); renderBoard();
  }, err=>{ setSync(false); console.error(err); });

  onSnapshot(collection(db,"results"), snap=>{
    resultsAll={}; snap.forEach(d=>resultsAll[d.id]=d.data());
    renderMatches(); renderBoard();
  }, err=>console.error(err));
}
function setSync(ok){
  const s=$("sync");
  s.classList.toggle("off",!ok);
  s.innerHTML=`<span class="dot"></span> ${ok?"canlı · senkron":"bağlantı yok"}`;
}

/* ============================================================
   6) SEKMELER
   ============================================================ */
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>showTab(t.dataset.v));
function showTab(v){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.v===v));
  ["matches","board","rules"].forEach(x=>$("view-"+x).classList.toggle("hidden",x!==v));
  if(v==="board") renderBoard();
  window.scrollTo(0,0);
}
function renderAll(){ renderMatches(); renderBoard(); renderRules(); }

/* ============================================================
   7) MAÇLAR
   ============================================================ */
function renderMatches(){
  if($("app").classList.contains("hidden")) return;
  let html=`<div class="sectitle">Maçlar</div><p>Skor tahminini gir, kaydet. Maç başlayınca tahminler kilitlenir ve herkese açılır.</p>`;
  matches.forEach(m=>{
    const st=statusOf(m), mine=myPreds()[m.id], res=resultsAll[m.id];
    const pill = st==="open"?`<span class="status-pill s-open">Açık</span>`
               : st==="live"?`<span class="status-pill s-live">● Kilitli</span>`
               : `<span class="status-pill s-done">Bitti</span>`;
    let mid;
    if(st==="open"){
      mid=`<div class="pred-inputs">
        <input type="number" min="0" id="h_${m.id}" value="${mine?mine.h:''}" inputmode="numeric">
        <span>-</span>
        <input type="number" min="0" id="a_${m.id}" value="${mine?mine.a:''}" inputmode="numeric"></div>`;
    } else {
      const sc = res?`${res.h} - ${res.a}`:(mine?`${mine.h} - ${mine.a}`:"– - –");
      mid=`<div class="finalscore">${sc}<small>${res?"Sonuç":"Tahminin"}</small></div>`;
    }
    let action;
    if(st==="open"){
      action=`<div class="saverow">
        <button class="btn" data-save="${m.id}">${mine?"Güncelle":"Kaydet"}</button>
        ${mine?`<span class="saved-note">✓ Kayıtlı</span>`:""}</div>`;
    } else {
      action=renderOthers(m)+adminResultBox(m);
    }
    html+=`<div class="card">
      <div class="mtop"><span class="grp">${m.group}</span>${pill}</div>
      <div class="teams">
        <div class="team"><div class="flag">${m.hf}</div><div class="name">${m.home}</div></div>
        <div class="mid">${mid}</div>
        <div class="team"><div class="flag">${m.af}</div><div class="name">${m.away}</div></div>
      </div>
      <div class="odds">
        <div class="odd"><div class="lab">1 ${m.home}</div><div class="val">${m.odds.h}</div></div>
        <div class="odd"><div class="lab">X Berabere</div><div class="val">${m.odds.d}</div></div>
        <div class="odd"><div class="lab">2 ${m.away}</div><div class="val">${m.odds.a}</div></div>
      </div>
      ${st==="open"?`<div class="lock-note">🔒 ${fmtDate(m.datetime)} — başlayınca kilitlenir</div>`:""}
      ${action}
    </div>`;
  });
  $("view-matches").innerHTML=html;
  document.querySelectorAll("[data-save]").forEach(b=>b.onclick=()=>save(b.dataset.save));
  document.querySelectorAll("[data-result]").forEach(b=>b.onclick=()=>saveResult(b.dataset.result));
}

function renderOthers(m){
  let rows="";
  Object.keys(predictionsAll).sort().forEach(name=>{
    const p=(predictionsAll[name].preds||{})[m.id]; if(!p) return;
    const pts=calcPoints(p,resultsAll[m.id]);
    const badge=pts===null?"":`<span class="pts ${ptsClass(pts)}">+${pts}</span>`;
    rows+=`<div class="prow"><div class="who"><div class="ava">${name[0].toUpperCase()}</div>${name===me?"<b>"+name+" (sen)</b>":name}</div>
      <div><span class="sc">${p.h} - ${p.a}</span>${badge}</div></div>`;
  });
  if(!rows) rows=`<div style="font-size:13px;color:var(--muted)">Bu maça tahmin giren olmadı.</div>`;
  const cnt=Object.keys(predictionsAll).filter(n=>(predictionsAll[n].preds||{})[m.id]).length;
  return `<div class="others"><h4><span>Herkesin tahmini</span><span>${cnt} kişi</span></h4>${rows}</div>`;
}

function adminResultBox(m){
  if(!isAdmin()) return "";
  const r=resultsAll[m.id];
  return `<div class="admin-box"><div class="lab">🛠️ Yönetici — maç sonucu</div>
    <div class="admin-row">
      <input type="number" min="0" id="rh_${m.id}" value="${r?r.h:''}" inputmode="numeric">
      <span style="color:var(--muted);font-weight:700">-</span>
      <input type="number" min="0" id="ra_${m.id}" value="${r?r.a:''}" inputmode="numeric">
      <button class="btn" data-result="${m.id}">${r?"Sonucu güncelle":"Sonucu kaydet"}</button>
    </div></div>`;
}

async function save(id){
  const h=parseInt($("h_"+id).value), a=parseInt($("a_"+id).value);
  if(isNaN(h)||isNaN(a)){ toast("İki skoru da gir"); return; }
  const preds={...myPreds(), [id]:{h,a}};
  try{ await setDoc(doc(db,"predictions",me),{name:me,preds},{merge:true}); toast("Tahmin kaydedildi ✓"); }
  catch(e){ toast("Kaydedilemedi"); console.error(e); }
}
async function saveResult(id){
  const h=parseInt($("rh_"+id).value), a=parseInt($("ra_"+id).value);
  if(isNaN(h)||isNaN(a)){ toast("İki skoru da gir"); return; }
  try{ await setDoc(doc(db,"results",id),{h,a}); toast("Sonuç kaydedildi ✓"); }
  catch(e){ toast("Kaydedilemedi"); console.error(e); }
}

/* ============================================================
   8) SIRALAMA
   ============================================================ */
function renderBoard(){
  if($("app").classList.contains("hidden")) return;
  const names=new Set(Object.keys(predictionsAll)); names.add(me);
  const scores=[...names].map(name=>{
    const preds=(predictionsAll[name]&&predictionsAll[name].preds)||{};
    let total=0,exact=0,played=0;
    matches.forEach(m=>{
      if(!resultsAll[m.id]) return;
      const pts=calcPoints(preds[m.id],resultsAll[m.id]);
      if(pts!=null){ total+=pts; played++; if(pts===CONFIG.points.exactScore) exact++; }
    });
    return {name,total,exact,played};
  }).sort((x,y)=>y.total-x.total||y.exact-x.exact);

  let html=`<div class="sectitle">Sıralama</div><p>Oynanan maçlardan toplanan puanlar.</p><div class="lb-card">`;
  scores.forEach((s,i)=>{
    const rc=i===0?"r1":i===1?"r2":i===2?"r3":"";
    const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":(i+1);
    html+=`<div class="lb-row ${s.name===me?'meRow':''}">
      <div class="rank ${rc}">${medal}</div>
      <div class="lb-name"><div class="ava">${s.name[0].toUpperCase()}</div>${s.name}${s.name===me?" (sen)":""}</div>
      <div class="lb-pts">${s.total} <small>p · ${s.exact} tam</small></div></div>`;
  });
  html+=`</div>`;
  $("view-board").innerHTML=html;
}

/* ============================================================
   9) KURALLAR
   ============================================================ */
function renderRules(){
  const p=CONFIG.points;
  $("view-rules").innerHTML=`
    <div class="sectitle">Puanlama Kuralları</div>
    <div class="card">
      <div class="rule"><span>🎯 Tam skoru bilmek</span><span class="pt">+${p.exactScore} puan</span></div>
      <div class="rule"><span>✅ Doğru sonuç (1 / X / 2)</span><span class="pt">+${p.correctResult} puan</span></div>
      <div class="rule"><span>❌ Yanlış tahmin</span><span class="pt">+${p.wrong} puan</span></div>
    </div>
    <div class="card" style="margin-top:6px">
      <div style="font-size:13px;color:var(--muted);line-height:1.7">
        • Tahminler maç <b>başlama anında kilitlenir</b>.<br>
        • Maç başlayınca herkesin tahmini <b>görünür</b> olur.<br>
        • Yönetici maç sonucunu girince <b>puanlar otomatik</b> dağılır.<br>
        • Oranlar referans amaçlıdır.
      </div>
    </div>`;
}

function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(tT); tT=setTimeout(()=>t.classList.remove("show"),1800); }

/* başlat */
if(me) start();
