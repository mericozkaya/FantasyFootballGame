<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dünya Kupası 2026 — Tahmin Ligi</title>
<style>
  :root{
    --bg1:#070b18; --bg2:#0c1330;
    --card:#141c3a; --card2:#1c2750; --line:#2b3666;
    --txt:#eef2ff; --muted:#94a1cc;
    --g1:#00e08a; --g2:#13b9e8; --gold:#ffd60a; --pink:#ff5d8f; --red:#ff5b5b; --blue:#4aa8ff;
    --rad:20px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--txt);min-height:100vh;
    background:radial-gradient(1200px 600px at 50% -10%,rgba(0,224,138,.10),transparent 60%),
               radial-gradient(900px 500px at 90% 0%,rgba(19,185,232,.10),transparent 55%),
               linear-gradient(180deg,var(--bg1),var(--bg2))}
  .grad-txt{background:linear-gradient(135deg,var(--g1),var(--g2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .btn-grad{background:linear-gradient(135deg,var(--g1),var(--g2));color:#04261b;border:none;border-radius:14px;
    padding:15px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;width:100%;letter-spacing:.2px;
    box-shadow:0 10px 30px rgba(0,224,138,.25);transition:transform .1s}
  .btn-grad:active{transform:scale(.98)} .btn-grad:disabled{opacity:.55;box-shadow:none}
  .hidden{display:none!important}

  /* AUTH */
  .auth{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:26px;gap:22px}
  .auth-hero{display:flex;flex-direction:column;align-items:center;gap:6px}
  .trophy{width:96px;height:96px;border-radius:30px;display:grid;place-items:center;font-size:46px;
    background:linear-gradient(135deg,var(--g1),var(--g2));box-shadow:0 18px 50px rgba(0,224,138,.35)}
  .auth-hero h1{margin:8px 0 0;font-size:26px;font-weight:900;text-align:center;letter-spacing:.3px}
  .auth-hero .subtitle{font-size:15px;color:var(--muted);font-weight:600;letter-spacing:3px;text-transform:uppercase}
  .auth-card{width:100%;max-width:360px;background:rgba(20,28,58,.7);backdrop-filter:blur(12px);
    border:1px solid var(--line);border-radius:24px;padding:20px;display:flex;flex-direction:column;gap:13px}
  .seg{display:flex;background:var(--bg1);border:1px solid var(--line);border-radius:13px;padding:4px;gap:4px}
  .seg-btn{flex:1;background:none;border:none;color:var(--muted);padding:10px;border-radius:9px;font-size:14px;
    font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
  .seg-btn.active{background:linear-gradient(135deg,var(--g1),var(--g2));color:#04261b}
  .auth-card input{width:100%;padding:15px;font-size:16px;background:var(--bg1);border:1.5px solid var(--line);
    border-radius:13px;color:var(--txt);outline:none;transition:border-color .15s}
  .auth-card input:focus{border-color:var(--g1)}
  .auth-err{font-size:13px;color:var(--red);text-align:center;min-height:16px;font-weight:600}
  .auth-foot{font-size:12px;color:var(--muted);text-align:center;margin-top:2px}

  /* HEADER */
  header{position:sticky;top:0;z-index:20;backdrop-filter:blur(14px);
    background:rgba(7,11,24,.82);border-bottom:1px solid var(--line);padding:13px 14px}
  .hwrap{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:900;font-size:16px}
  .brand .ball{width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,var(--g1),var(--g2));
    display:grid;place-items:center;font-size:16px}
  .me{display:flex;align-items:center;gap:9px}
  .me .ava{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--pink),#b34bff);
    display:grid;place-items:center;font-size:14px;font-weight:800;color:#fff}
  .logout{background:none;border:1px solid var(--line);color:var(--muted);padding:6px 10px;border-radius:10px;
    font-size:12px;cursor:pointer;font-family:inherit}
  .sync{max-width:600px;margin:8px auto 0;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--g1)}
  .sync .dot{width:7px;height:7px;border-radius:50%;background:var(--g1);animation:pulse 2s infinite}
  .sync.off{color:var(--muted)} .sync.off .dot{background:var(--muted);animation:none}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(0,224,138,.5)}70%{box-shadow:0 0 0 7px rgba(0,224,138,0)}100%{box-shadow:0 0 0 0 rgba(0,224,138,0)}}

  .wrap{max-width:600px;margin:0 auto;padding:0 14px 96px}
  .sectitle{font-size:22px;font-weight:900;margin:20px 2px 4px}
  .sectitle + p{margin:0 2px 14px;color:var(--muted);font-size:13px}

  /* MATCH CARD */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--rad);padding:15px;margin-bottom:13px}
  .mtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .grp{font-size:11px;color:var(--muted);background:var(--card2);padding:4px 9px;border-radius:8px;font-weight:700}
  .status-pill{font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px}
  .s-open{background:rgba(0,224,138,.16);color:var(--g1)} .s-live{background:rgba(255,91,91,.18);color:#ff8a8a}
  .s-done{background:rgba(148,161,204,.16);color:var(--muted)}
  .teams{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .team{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;text-align:center}
  .team .flag{font-size:40px;line-height:1;filter:drop-shadow(0 4px 8px rgba(0,0,0,.4))}
  .team .name{font-size:13px;font-weight:700}
  .mid{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:104px}
  .pred-inputs{display:flex;align-items:center;gap:7px}
  .pred-inputs input{width:46px;height:52px;text-align:center;font-size:23px;font-weight:900;
    background:var(--bg1);border:2px solid var(--line);border-radius:13px;color:var(--txt);outline:none}
  .pred-inputs input:focus{border-color:var(--g1)}
  .pred-inputs span{font-size:20px;color:var(--muted);font-weight:800}
  .finalscore{font-size:28px;font-weight:900;letter-spacing:1px}
  .finalscore small{font-size:11px;color:var(--muted);display:block;font-weight:700;letter-spacing:0;margin-top:2px}
  .odds{display:flex;gap:7px;margin-top:15px}
  .odd{flex:1;background:var(--bg1);border:1px solid var(--line);border-radius:11px;padding:8px 4px;text-align:center}
  .odd .lab{font-size:10px;color:var(--muted);font-weight:600}
  .odd .val{font-size:14px;font-weight:800;margin-top:3px}
  .saverow{display:flex;gap:9px;margin-top:14px;align-items:center}
  .saved-note{font-size:12px;color:var(--g1);font-weight:700;white-space:nowrap}
  .lock-note{font-size:12px;color:var(--muted);margin-top:12px;display:flex;align-items:center;gap:6px}

  .admin-box{margin-top:13px;background:rgba(74,168,255,.08);border:1px solid rgba(74,168,255,.3);border-radius:13px;padding:12px}
  .admin-box .lab{font-size:11px;color:var(--blue);font-weight:800;margin-bottom:9px}
  .admin-row{display:flex;align-items:center;gap:9px}
  .admin-row input{width:48px;height:42px;text-align:center;font-size:18px;font-weight:900;background:var(--bg1);
    border:2px solid var(--line);border-radius:11px;color:var(--txt);outline:none}
  .admin-row button{background:var(--blue);color:#03203f;border:none;border-radius:11px;padding:11px 14px;
    font-size:13px;font-weight:800;cursor:pointer;font-family:inherit}

  .others{margin-top:14px;border-top:1px solid var(--line);padding-top:12px}
  .others h4{margin:0 0 10px;font-size:12px;color:var(--muted);font-weight:800;display:flex;justify-content:space-between}
  .prow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:13px;border-bottom:1px dashed var(--line)}
  .prow:last-child{border-bottom:none}
  .prow .who{display:flex;align-items:center;gap:9px}
  .ava-s{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#7b6bff);
    display:grid;place-items:center;font-size:11px;font-weight:800;color:#fff}
  .prow .sc{font-weight:800}
  .pts{font-size:11px;font-weight:900;padding:3px 9px;border-radius:20px;margin-left:9px}
  .p5{background:rgba(0,224,138,.2);color:var(--g1)} .p3{background:rgba(74,168,255,.2);color:var(--blue)}
  .p0{background:rgba(148,161,204,.14);color:var(--muted)} .pneg{background:rgba(255,91,91,.2);color:#ff8a8a}

  /* LIG / PODIUM */
  .podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin:8px 0 18px}
  .pod{flex:1;max-width:120px;display:flex;flex-direction:column;align-items:center;gap:7px}
  .pod .pava{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;font-size:20px;font-weight:900;color:#04261b}
  .pod .pn{font-size:13px;font-weight:800;text-align:center}
  .pod .pp{font-size:12px;color:var(--muted);font-weight:700}
  .pod .bar{width:100%;border-radius:12px 12px 0 0;display:grid;place-items:start center;padding-top:8px;font-size:18px;font-weight:900;color:rgba(0,0,0,.45)}
  .pod1 .pava{background:linear-gradient(135deg,#ffe066,var(--gold))} .pod1 .bar{height:92px;background:linear-gradient(180deg,var(--gold),#caa800)}
  .pod2 .pava{background:linear-gradient(135deg,#eef2ff,#aebbd6);color:#1a2236} .pod2 .bar{height:66px;background:linear-gradient(180deg,#cfd7ea,#8e9bbd)}
  .pod3 .pava{background:linear-gradient(135deg,#f0a979,#cd7f32)} .pod3 .bar{height:50px;background:linear-gradient(180deg,#d98b4f,#a5662a)}
  .lb-card{background:var(--card);border:1px solid var(--line);border-radius:var(--rad);overflow:hidden}
  .lb-row{display:flex;align-items:center;gap:13px;padding:14px;border-bottom:1px solid var(--line)}
  .lb-row:last-child{border-bottom:none}
  .lb-row.meRow{background:rgba(0,224,138,.08)}
  .rank{width:24px;text-align:center;font-weight:900;font-size:15px;color:var(--muted)}
  .lb-name{flex:1;font-weight:700;display:flex;align-items:center;gap:10px}
  .lb-pts{font-weight:900;font-size:17px}
  .lb-pts small{font-size:11px;color:var(--muted);font-weight:700}

  .rule{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--line);gap:12px}
  .rule:last-child{border-bottom:none}
  .rule .pt{font-weight:900;color:var(--g1);white-space:nowrap;font-size:13px}

  /* TABS */
  .tabs{position:fixed;bottom:0;left:0;right:0;z-index:30;background:rgba(7,11,24,.94);
    backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex}
  .tabs .inner{max-width:600px;margin:0 auto;display:flex;width:100%}
  .tab{flex:1;background:none;border:none;color:var(--muted);padding:11px 0 15px;font-size:11px;font-weight:700;
    display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;font-family:inherit}
  .tab svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:1.9}
  .tab.active{color:var(--g1)}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:84px;background:linear-gradient(135deg,var(--g1),var(--g2));
    color:#04261b;padding:11px 20px;border-radius:30px;font-weight:800;font-size:13px;z-index:50;opacity:0;transition:.3s;pointer-events:none}
  .toast.show{opacity:1;bottom:96px}

  /* GRUPLAR */
  .ghead{font-weight:800;font-size:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
  .gdone{font-size:10px;color:var(--g1);background:rgba(0,224,138,.15);padding:3px 8px;border-radius:20px;font-weight:700}
  .grow{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--line);border-radius:12px;margin-bottom:7px;background:var(--bg1)}
  .grow.gtap{cursor:pointer} .grow.gtap:active{transform:scale(.99)}
  .gflag{font-size:22px;line-height:1} .gname{flex:1;font-size:13px;font-weight:700}
  .grank{width:27px;height:27px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--g2));color:#04261b;display:grid;place-items:center;font-size:13px;font-weight:900}
  .grank.gempty{background:var(--card2);color:transparent}
  .gactual{font-size:14px;font-weight:900;color:var(--muted);min-width:27px;text-align:center} .gactual.gok{color:var(--g1)}
  .gclear{background:none;border:1px solid var(--line);color:var(--muted);border-radius:12px;padding:11px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  /* BRACKET / KUPA */
  .cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:8px;margin-bottom:4px}
  .cteam{display:flex;align-items:center;gap:7px;padding:9px 10px;border:1px solid var(--line);border-radius:11px;background:var(--bg1);font-size:12px;font-weight:700}
  .cteam.ctap{cursor:pointer} .cteam.ctap:active{transform:scale(.98)}
  .cteam.csel{border-color:var(--g1);background:rgba(0,224,138,.15)}
  .cteam.cwin{border-color:var(--gold);background:rgba(245,197,24,.16)}
</style>
</head>
<body>

<div id="auth" class="auth">
  <div class="auth-hero">
    <div class="trophy">🏆</div>
    <h1>Dünya Kupası 2026</h1>
    <div class="subtitle">Tahmin Ligi</div>
  </div>
  <div class="auth-card">
    <div class="seg">
      <button class="seg-btn active" data-mode="login">Giriş Yap</button>
      <button class="seg-btn" data-mode="register">Kayıt Ol</button>
    </div>
    <input id="authName" placeholder="Adın" autocomplete="off" maxlength="20">
    <input id="authPass" type="password" placeholder="Şifre" autocomplete="off">
    <button class="btn-grad" id="authBtn">Giriş Yap</button>
    <div class="auth-err" id="authErr"></div>
    <div class="auth-foot">15 kişilik arkadaş ligi · tek havuz</div>
  </div>
</div>

<div id="app" class="hidden">
  <header>
    <div class="hwrap">
      <div class="brand"><span class="ball">⚽</span> DK Tahmin Ligi</div>
      <div class="me"><span class="ava" id="meAva"></span>
        <button class="logout" id="logoutBtn">Çıkış</button></div>
    </div>
    <div class="sync off" id="sync"><span class="dot"></span> bağlanıyor…</div>
  </header>
  <div class="wrap">
    <div id="view-matches"></div>
    <div id="view-groups" class="hidden"></div>
    <div id="view-bracket" class="hidden"></div>
    <div id="view-board" class="hidden"></div>
    <div id="view-rules" class="hidden"></div>
  </div>
  <nav class="tabs"><div class="inner">
    <button class="tab active" data-v="matches">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>Maçlar</button>
    <button class="tab" data-v="groups">
      <svg viewBox="0 0 24 24"><path d="M9 6h11M9 12h11M9 18h11M4 6h.01M4 12h.01M4 18h.01"/></svg>Gruplar</button>
    <button class="tab" data-v="board">
      <svg viewBox="0 0 24 24"><path d="M8 21h8M12 17v4M5 4h14v5a7 7 0 01-14 0z"/><path d="M5 6H3v2a3 3 0 003 3M19 6h2v2a3 3 0 01-3 3"/></svg>Lig</button>
    <button class="tab" data-v="bracket">
      <svg viewBox="0 0 24 24"><path d="M8 21h8M12 17v4M7 4h10v4a5 5 0 01-10 0z"/><path d="M7 6H4v2a3 3 0 003 3M17 6h3v2a3 3 0 01-3 3"/></svg>Kupa</button>
    <button class="tab" data-v="rules">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h9"/></svg>Kurallar</button>
  </div></nav>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, getDoc, setDoc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAbeNEfOCgwBHqzXEXat6szSxF-o5doYN0",
  authDomain: "fantasyfootbalgame.firebaseapp.com",
  projectId: "fantasyfootbalgame",
  storageBucket: "fantasyfootbalgame.firebasestorage.app",
  messagingSenderId: "830281167704",
  appId: "1:830281167704:web:ecc751710ec2d880d62b2d"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ===== AYARLAR (puanlama burada) ===== */
const CONFIG = {
  // Tur bazlı skor puanı; çıkan puan o sonucun 1/X/2 ORANIYLA çarpılır.
  rounds: {
    group: { exact:20, corr:-2, wDraw:-5, wWin:-7, drawBonus:5, winBonus:3, label:"Grup" },
    r32:   { exact:28, corr:-3, wDraw:-7,  wWin:-10, label:"Son 32" },
    r16:   { exact:35, corr:-4, wDraw:-10, wWin:-14, label:"Son 16" },
    qf:    { exact:45, corr:-5, wDraw:-13, wWin:-18, label:"Çeyrek Final" },
    sf:    { exact:55, corr:-7, wDraw:-15, wWin:-21, label:"Yarı Final" },
    final: { exact:70, corr:-9, wDraw:-18, wWin:-24, label:"Final" },
  },
  championPts: 30,                       // şampiyonu bilene
  advancePts: { r32:8, r16:10, qf:15, sf:20 }, // tur atlayanı bilme (bracket, Son 32'de açılır)
  admins: ["Meriç"],
};
function roundOf(dt){
  const d=new Date(dt);
  if(d < new Date("2026-06-28T00:00:00Z")) return "group";
  if(d < new Date("2026-07-04T00:00:00Z")) return "r32";
  if(d < new Date("2026-07-08T00:00:00Z")) return "r16";
  if(d < new Date("2026-07-12T00:00:00Z")) return "qf";
  if(d < new Date("2026-07-17T00:00:00Z")) return "sf";
  return "final";
}
let matches = []; // Firestore "matches" koleksiyonundan doldurulur (api/sync.js yazar)

/* ===== DURUM ===== */
const $ = id => document.getElementById(id);
let me = localStorage.getItem("dk_user") || "";
let predictionsAll = {}, resultsAll = {}, usersAll = {};
const isAdmin = () => CONFIG.admins.some(a => a.toLocaleLowerCase("tr")===me.toLocaleLowerCase("tr"));
const myPreds = () => (predictionsAll[me] && predictionsAll[me].preds) || {};
const fmt = n => Math.round(n*100)/100;
const outcome = (h,a) => Math.sign(h-a);
const isExact = (p,r) => !!p && !!r && p.h===r.h && p.a===r.a;
const oddsFor = (m,oc) => m && m.odds ? parseFloat(oc>0?m.odds.h : oc<0?m.odds.a : m.odds.d) : 1;
function statusOf(m){ if(resultsAll[m.id]) return "done"; if(new Date()>=new Date(m.datetime)) return "live"; return "open"; }
function fmtDate(iso){ const d=new Date(iso); return d.toLocaleDateString("tr-TR",{day:"numeric",month:"long",weekday:"short"})+" · "+d.toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"}); }

function calcPoints(pred,res,m){
  if(!pred||!res||!m) return null;
  const R=CONFIG.rounds[roundOf(m.datetime)]||CONFIG.rounds.group;
  const ro=outcome(res.h,res.a), po=outcome(pred.h,pred.a);
  const dev=Math.abs(pred.h-res.h)+Math.abs(pred.a-res.a);
  const odd=oddsFor(m,ro);                       // gerçekleşen sonucun oranı
  const bonus=(R.drawBonus!==undefined && po===ro)?(ro===0?R.drawBonus:R.winBonus):0; // grup sonuç bonusu
  let base;
  if(isExact(pred,res)) base = R.exact + bonus;
  else if(po===ro)      base = R.corr*dev + bonus;
  else if(ro===0)       base = R.wDraw*dev;
  else if(po===0)       base = R.wWin*dev;
  else                  base = 0;                // ters galip
  return base * odd;                             // çıkan puan × oran
}
const ptsClass = p => p>=20?"p5":p>0?"p3":p<0?"pneg":"p0";

/* ===== KAYIT / GİRİŞ ===== */
async function sha256(s){ const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s)); return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join(""); }
let authMode="login";
document.querySelectorAll(".seg-btn").forEach(b=>b.onclick=()=>{
  authMode=b.dataset.mode;
  document.querySelectorAll(".seg-btn").forEach(x=>x.classList.toggle("active",x===b));
  $("authBtn").textContent = authMode==="login"?"Giriş Yap":"Hesap Oluştur";
  $("authErr").textContent="";
});
$("authBtn").onclick = doAuth;
$("authPass").addEventListener("keydown",e=>{ if(e.key==="Enter") doAuth(); });
async function doAuth(){
  const name=$("authName").value.trim(), pass=$("authPass").value;
  $("authErr").textContent="";
  if(name.length<2){ $("authErr").textContent="Adın en az 2 karakter olmalı."; return; }
  if(pass.length<3){ $("authErr").textContent="Şifre en az 3 karakter olmalı."; return; }
  $("authBtn").disabled=true;
  try{
    const ref=doc(db,"users",name), snap=await getDoc(ref);
    const hash=await sha256(name+":"+pass);
    if(authMode==="register"){
      if(snap.exists()){ $("authErr").textContent="Bu isim alınmış, giriş yapmayı dene."; return; }
      await setDoc(ref,{name,pass:hash,createdAt:Date.now()});
      loginOk(name);
    } else {
      if(!snap.exists()){ $("authErr").textContent="Böyle bir kullanıcı yok, kayıt ol."; return; }
      if(snap.data().pass!==hash){ $("authErr").textContent="Şifre yanlış."; return; }
      loginOk(name);
    }
  }catch(e){ $("authErr").textContent="Bağlantı hatası, tekrar dene."; console.error(e); }
  finally{ $("authBtn").disabled=false; }
}
function loginOk(name){ me=name; localStorage.setItem("dk_user",name); start(); }
$("logoutBtn").onclick = ()=>{ localStorage.removeItem("dk_user"); location.reload(); };

function start(){
  $("auth").classList.add("hidden");
  $("app").classList.remove("hidden");
  $("meAva").textContent = me[0].toUpperCase();
  subscribe(); renderAll();
}

/* ===== SENKRON ===== */
function subscribe(){
  onSnapshot(collection(db,"predictions"), s=>{ predictionsAll={}; s.forEach(d=>predictionsAll[d.id]=d.data()); setSync(true); renderMatches(); renderBoard(); }, e=>{setSync(false);console.error(e);});
  onSnapshot(collection(db,"results"), s=>{ resultsAll={}; s.forEach(d=>resultsAll[d.id]=d.data()); renderMatches(); renderBoard(); }, e=>console.error(e));
  onSnapshot(collection(db,"users"), s=>{ usersAll={}; s.forEach(d=>usersAll[d.id]=d.data()); renderBoard(); }, e=>console.error(e));
  onSnapshot(collection(db,"matches"), s=>{ matches = s.docs.map(d=>({id:d.id,...d.data()})).sort((x,y)=>new Date(x.datetime)-new Date(y.datetime)); renderMatches(); renderBoard(); }, e=>console.error(e));
  onSnapshot(collection(db,"grouppreds"), s=>{ groupPredsAll={}; s.forEach(d=>groupPredsAll[d.id]=d.data()); renderGroups(); renderBoard(); }, e=>console.error(e));
  onSnapshot(collection(db,"standings"), s=>{ standingsAll={}; s.forEach(d=>standingsAll[d.id]=d.data()); renderGroups(); renderBoard(); }, e=>console.error(e));
  onSnapshot(collection(db,"meta"), s=>{ metaAll={}; s.forEach(d=>metaAll[d.id]=d.data()); renderBracket(); renderBoard(); }, e=>console.error(e));
}
function setSync(ok){ const s=$("sync"); s.classList.toggle("off",!ok); s.innerHTML=`<span class="dot"></span> ${ok?"canlı · senkron":"bağlantı yok"}`; }

/* ===== SEKMELER ===== */
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>showTab(t.dataset.v));
function showTab(v){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.v===v));
  ["matches","groups","bracket","board","rules"].forEach(x=>$("view-"+x).classList.toggle("hidden",x!==v));
  if(v==="board") renderBoard(); if(v==="groups") renderGroups(); if(v==="bracket") renderBracket();
  window.scrollTo(0,0);
}
function renderAll(){ renderMatches(); renderGroups(); renderBracket(); renderBoard(); renderRules(); }

/* ===== MAÇLAR ===== */
function renderMatches(){
  if($("app").classList.contains("hidden")) return;
  const now=Date.now(), WIN=36*60*60*1000, ko=m=>new Date(m.datetime).getTime();
  const acik    = matches.filter(m=>statusOf(m)==="open" && ko(m)<=now+WIN);
  const sonraki = matches.filter(m=>statusOf(m)==="open" && ko(m)> now+WIN);
  const oynanan = matches.filter(m=>statusOf(m)!=="open" && ko(m)> now-48*60*60*1000).sort((a,b)=>ko(b)-ko(a));

  const fullCard=m=>{
    const st=statusOf(m), mine=myPreds()[m.id], res=resultsAll[m.id];
    const pill = st==="open"?`<span class="status-pill s-open">Açık</span>`: st==="live"?`<span class="status-pill s-live">● Kilitli</span>`:`<span class="status-pill s-done">Bitti</span>`;
    let mid;
    if(st==="open"){
      mid=`<div class="pred-inputs"><input type="number" min="0" id="h_${m.id}" value="${mine?mine.h:''}" inputmode="numeric"><span>-</span><input type="number" min="0" id="a_${m.id}" value="${mine?mine.a:''}" inputmode="numeric"></div>`;
    } else {
      const sc = res?`${res.h} - ${res.a}`:(mine?`${mine.h} - ${mine.a}`:"– - –");
      mid=`<div class="finalscore">${sc}<small>${res?"Sonuç":"Tahminin"}</small></div>`;
    }
    let action;
    if(st==="open"){
      action=`<div class="saverow"><button class="btn-grad" data-save="${m.id}">${mine?"Güncelle":"Kaydet"}</button>${mine?`<span class="saved-note">✓ Kayıtlı</span>`:""}</div>`;
    } else { action=renderOthers(m)+adminResultBox(m); }
    return `<div class="card"><div class="mtop"><span class="grp">${(CONFIG.rounds[roundOf(m.datetime)]||{}).label||m.group}</span>${pill}</div>
      <div class="teams">
        <div class="team"><div class="flag">${m.hf}</div><div class="name">${m.home}</div></div>
        <div class="mid">${mid}</div>
        <div class="team"><div class="flag">${m.af}</div><div class="name">${m.away}</div></div>
      </div>
      <div class="odds">
        <div class="odd"><div class="lab">1 ${m.home}</div><div class="val">${(m.odds||{}).h||'-'}</div></div>
        <div class="odd"><div class="lab">X Berabere</div><div class="val">${(m.odds||{}).d||'-'}</div></div>
        <div class="odd"><div class="lab">2 ${m.away}</div><div class="val">${(m.odds||{}).a||'-'}</div></div>
      </div>
      ${st==="open"?`<div class="lock-note">🔒 ${fmtDate(m.datetime)} — başlayınca kilitlenir</div>`:""}
      ${action}</div>`;
  };
  const previewCard=m=>`<div class="card" style="opacity:.85"><div class="mtop"><span class="grp">${(CONFIG.rounds[roundOf(m.datetime)]||{}).label||m.group}</span><span class="when" style="font-size:11px;color:var(--muted)">${fmtDate(m.datetime)}</span></div>
      <div class="teams">
        <div class="team"><div class="flag">${m.hf}</div><div class="name">${m.home}</div></div>
        <div class="mid"><div style="font-size:18px;font-weight:900;color:var(--muted)">vs</div></div>
        <div class="team"><div class="flag">${m.af}</div><div class="name">${m.away}</div></div>
      </div>
      <div class="odds">
        <div class="odd"><div class="lab">1</div><div class="val">${(m.odds||{}).h||'-'}</div></div>
        <div class="odd"><div class="lab">X</div><div class="val">${(m.odds||{}).d||'-'}</div></div>
        <div class="odd"><div class="lab">2</div><div class="val">${(m.odds||{}).a||'-'}</div></div>
      </div>
      <div class="lock-note">🔒 Günü gelince tahmine açılır</div></div>`;

  let html=`<div class="sectitle">Tahmine Açık</div><p>Maçtan 36 saat önce açılır · başlayınca kilitlenir.</p>`;
  if(!matches.length){ $("view-matches").innerHTML=html+`<div class="card" style="text-align:center;color:var(--muted)">Maçlar yükleniyor…</div>`; return; }
  html += acik.length ? acik.map(fullCard).join("")
        : `<div class="card" style="text-align:center;color:var(--muted)">Şu an tahmine açık maç yok — sıradakiler aşağıda.</div>`;
  if(oynanan.length){
    html += `<div class="sectitle" style="font-size:18px">Canlı & Biten</div>`;
    html += oynanan.map(fullCard).join("");
  }
  if(sonraki.length){
    html += `<div class="sectitle" style="font-size:18px">Sonraki Maçlar</div><p>Önizleme · maçtan 36 saat önce açılır.</p>`;
    html += sonraki.slice(0,20).map(previewCard).join("");
    if(sonraki.length>20) html += `<div style="text-align:center;color:var(--muted);font-size:12px;padding:8px">…ve ${sonraki.length-20} maç daha</div>`;
  }
  $("view-matches").innerHTML=html;
  document.querySelectorAll("[data-save]").forEach(b=>b.onclick=()=>save(b.dataset.save));
  document.querySelectorAll("[data-result]").forEach(b=>b.onclick=()=>saveResult(b.dataset.result));
}
function renderOthers(m){
  let rows="";
  Object.keys(predictionsAll).sort().forEach(name=>{
    const p=(predictionsAll[name].preds||{})[m.id]; if(!p) return;
    const pts=calcPoints(p,resultsAll[m.id],m);
    const badge=pts===null?"":`<span class="pts ${ptsClass(pts)}">${pts>0?'+':''}${fmt(pts)}</span>`;
    rows+=`<div class="prow"><div class="who"><div class="ava-s">${name[0].toUpperCase()}</div>${name===me?"<b>"+name+" (sen)</b>":name}</div><div><span class="sc">${p.h} - ${p.a}</span>${badge}</div></div>`;
  });
  if(!rows) rows=`<div style="font-size:13px;color:var(--muted)">Bu maça tahmin giren olmadı.</div>`;
  const cnt=Object.keys(predictionsAll).filter(n=>(predictionsAll[n].preds||{})[m.id]).length;
  return `<div class="others"><h4><span>Herkesin tahmini</span><span>${cnt} kişi</span></h4>${rows}</div>`;
}
function adminResultBox(m){

async function save(id){

  if(isNaN(h)||isNaN(a)){ toast("İki skoru da gir"); return; }
  const preds={...myPreds(), [id]:{h,a}};
  try{ await setDoc(doc(db,"predictions",me),{name:me,preds},{merge:true}); toast("Tahmin kaydedildi ✓"); }catch(e){ toast("Kaydedilemedi"); console.error(e); }
}
async function saveResult(id){
  const h=parseInt($("rh_"+id).value), a=parseInt($("ra_"+id).value);
  if(isNaN(h)||isNaN(a)){ toast("İki skoru da gir"); return; }
  try{ await setDoc(doc(db,"results",id),{h,a}); toast("Sonuç kaydedildi ✓"); }catch(e){ toast("Kaydedilemedi"); console.error(e); }
}

/* ===== LİG ===== */
function renderBoard(){
  if($("app").classList.contains("hidden")) return;
  const names=new Set([...Object.keys(usersAll),...Object.keys(predictionsAll)]); names.add(me);
  const scores=[...names].map(name=>{
    const preds=(predictionsAll[name]&&predictionsAll[name].preds)||{};
    let total=0,exact=0;
    matches.forEach(m=>{ if(!resultsAll[m.id]) return; const pts=calcPoints(preds[m.id],resultsAll[m.id],m); if(pts!=null){ total+=pts; if(isExact(preds[m.id],resultsAll[m.id])) exact++; } });
    total += groupPointsFor(name) + championPointsFor(name);
    return {name,total:fmt(total),exact};
  }).sort((x,y)=>y.total-x.total||y.exact-x.exact);

  let html=`<div class="sectitle">Lig Tablosu</div><p>${scores.length} oyuncu · oynanan maçlardan toplanan puanlar.</p>`;
  const top=scores.slice(0,3);
  if(top.length===3 && top[0].total!==0){
    const ord=[top[1],top[0],top[2]], cls=["pod2 pod","pod1 pod","pod3 pod"], rk=["2","1","3"];
    html+=`<div class="podium">`+ord.map((s,i)=>`<div class="${cls[i]}"><div class="pava">${s.name[0].toUpperCase()}</div><div class="pn">${s.name}</div><div class="pp">${s.total} p</div><div class="bar">${rk[i]}</div></div>`).join("")+`</div>`;
  }
  html+=`<div class="lb-card">`;
  scores.forEach((s,i)=>{
    const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":(i+1);
    html+=`<div class="lb-row ${s.name===me?'meRow':''}"><div class="rank">${medal}</div><div class="lb-name"><div class="ava-s">${s.name[0].toUpperCase()}</div>${s.name}${s.name===me?" (sen)":""}</div><div class="lb-pts">${s.total} <small>p · ${s.exact} tam</small></div></div>`;
  });
  html+=`</div>`;
  $("view-board").innerHTML=html;
}

const GROUPS = {
  A:[{n:"Meksika",f:"🇲🇽"},{n:"Güney Afrika",f:"🇿🇦"},{n:"Güney Kore",f:"🇰🇷"},{n:"Çekya",f:"🇨🇿"}],

  L:[{n:"İngiltere",f:"🏴󠁧󠁢󠁥󠁮󠁧󠁿"},{n:"Hırvatistan",f:"🇭🇷"},{n:"Gana",f:"🇬🇭"},{n:"Panama",f:"🇵🇦"}],
};
const GROUP_DEADLINE = new Date("2026-06-27T00:00:00Z"); // grup sıralama tahmini bu ana kadar açık
const groupRankPts = c => c>=4?20 : c===2?8 : c===1?3 : 0; // 3 imkansız

let groupPredsAll={}, standingsAll={};
let myGroupPicks={}, adminStand={};
const myGP = () => (groupPredsAll[me] && groupPredsAll[me].picks) || {};
function correctCount(pred,actual){ if(!pred||!actual) return 0; let c=0; for(let i=0;i<4;i++) if(pred[i]&&pred[i]===actual[i]) c++; return c; }
function groupPointsFor(name){
  const picks=(groupPredsAll[name]&&groupPredsAll[name].picks)||{}; let t=0;
  for(const G in GROUPS){ const act=standingsAll[G]&&standingsAll[G].order; if(act) t+=groupRankPts(correctCount(picks[G],act)); }
  return t;
}
function tapTeam(G,t){
  if(new Date()>=GROUP_DEADLINE) return;
  const cur = myGroupPicks[G] ? [...myGroupPicks[G]] : (myGP()[G]?[...myGP()[G]]:[]);
  const i=cur.indexOf(t); if(i>=0) cur.splice(i,1); else if(cur.length<4) cur.push(t);
  myGroupPicks[G]=cur; renderGroups();
}
function tapAdmin(G,t){
  const cur = adminStand[G] ? [...adminStand[G]] : ((standingsAll[G]&&standingsAll[G].order)?[...standingsAll[G].order]:[]);
  const i=cur.indexOf(t); if(i>=0) cur.splice(i,1); else if(cur.length<4) cur.push(t);
  adminStand[G]=cur; renderGroups();
}
async function saveGroup(G){
  const picks = myGroupPicks[G] || myGP()[G];
  if(!picks||picks.length!==4){ toast("Önce 4 takımı sırala"); return; }
  const all={...myGP(), [G]:picks};
  try{ await setDoc(doc(db,"grouppreds",me),{name:me,picks:all},{merge:true}); toast(G+" grubu kaydedildi ✓"); }catch(e){ toast("Kaydedilemedi"); console.error(e); }
}
async function saveStandings(G){
  const ord = adminStand[G] || (standingsAll[G]&&standingsAll[G].order);
  if(!ord||ord.length!==4){ toast("4 takımı sırala"); return; }
  try{ await setDoc(doc(db,"standings",G),{order:ord}); toast(G+" sonucu kaydedildi ✓"); }catch(e){ toast("Kaydedilemedi"); console.error(e); }
}
function renderGroups(){
  if($("app").classList.contains("hidden")) return;
  const open = new Date() < GROUP_DEADLINE;
  const saved = myGP();
  const son = GROUP_DEADLINE.toLocaleDateString("tr-TR",{day:"numeric",month:"long"});
  let html=`<div class="sectitle">Grup Sıralaması</div><p>${open?`Her grubu sırayla dokunarak 1→4 diz. Son tarih: ${son}.`:"Tahminler kilitlendi."}</p>`;
  for(const G in GROUPS){
    const picks = myGroupPicks[G] || saved[G] || [];
    const act = standingsAll[G] && standingsAll[G].order;
    const cc = act ? correctCount(saved[G], act) : null;
    html += `<div class="card"><div class="ghead"><span>${G} Grubu</span>${act?`<span class="gdone">✓ ${cc} doğru · +${groupRankPts(cc)}</span>`:""}</div>`;
    GROUPS[G].forEach(t=>{
      const rank = picks.indexOf(t.n);
      const badge = rank>=0 ? `<span class="grank">${rank+1}</span>` : `<span class="grank gempty">0</span>`;
      let right;
      if(act){ const ar=act.indexOf(t.n)+1; const ok=rank>=0&&(rank+1)===ar; right=`<span class="gactual ${ok?'gok':''}">${ar}.</span>`; }
      else right=badge;
      html += `<div class="grow ${open?'gtap':''}" ${open?`data-g="${G}" data-t="${t.n}"`:""}><span class="gflag">${t.f}</span><span class="gname">${t.n}</span>${right}</div>`;
    });
    if(open){
      const full=(myGroupPicks[G]||saved[G]||[]).length===4;
      html += `<div class="saverow"><button class="btn-grad" data-gsave="${G}" ${full?"":"disabled"}>${saved[G]?"Güncelle":"Kaydet"}</button><button class="gclear" data-gclear="${G}">Temizle</button></div>`;
    }
    html += `</div>`;
  }
  if(isAdmin()){
    html += `<div class="sectitle" style="font-size:18px">🛠️ Yönetici — Grup Sonuçları</div><p>Grup bitince gerçek 1→4 sırasını gir; puanlar otomatik dağılır.</p>`;
    for(const G in GROUPS){
      const cur = adminStand[G] || (standingsAll[G]&&standingsAll[G].order) || [];
      html += `<div class="card" style="border-color:rgba(74,168,255,.3)"><div class="ghead"><span>${G} Grubu</span></div>`;
      GROUPS[G].forEach(t=>{
        const r=cur.indexOf(t.n);
        const badge=r>=0?`<span class="grank" style="background:linear-gradient(135deg,var(--blue),#7b6bff);color:#fff">${r+1}</span>`:`<span class="grank gempty">0</span>`;
        html += `<div class="grow gtap" data-ag="${G}" data-at="${t.n}"><span class="gflag">${t.f}</span><span class="gname">${t.n}</span>${badge}</div>`;
      });
      const full=cur.length===4;
      html += `<div class="saverow"><button class="btn-grad" data-asave="${G}" ${full?"":"disabled"} style="background:linear-gradient(135deg,var(--blue),#7b6bff);color:#fff">Sonucu Kaydet</button><button class="gclear" data-aclear="${G}">Temizle</button></div></div>`;
    }
  }
  $("view-groups").innerHTML=html;
  document.querySelectorAll("[data-g]").forEach(el=>el.onclick=()=>tapTeam(el.dataset.g,el.dataset.t));
  document.querySelectorAll("[data-gsave]").forEach(b=>b.onclick=()=>saveGroup(b.dataset.gsave));
  document.querySelectorAll("[data-gclear]").forEach(b=>b.onclick=()=>{ myGroupPicks[b.dataset.gclear]=[]; renderGroups(); });
  document.querySelectorAll("[data-ag]").forEach(el=>el.onclick=()=>tapAdmin(el.dataset.ag,el.dataset.at));
  document.querySelectorAll("[data-asave]").forEach(b=>b.onclick=()=>saveStandings(b.dataset.asave));
  document.querySelectorAll("[data-aclear]").forEach(b=>b.onclick=()=>{ adminStand[b.dataset.aclear]=[]; renderGroups(); });
}

/* ===== KUPA / ŞAMPİYON + bracket iskeleti ===== */
let champPick=null, adminCh=null, metaAll={};
function championPointsFor(name){
  const ac=metaAll.tournament&&metaAll.tournament.champion; if(!ac) return 0;
  const pc=groupPredsAll[name]&&groupPredsAll[name].champion;
  return pc===ac?CONFIG.championPts:0;
}
async function saveChampion(){
  const c=champPick||(groupPredsAll[me]&&groupPredsAll[me].champion);
  if(!c){ toast("Bir takım seç"); return; }
  try{ await setDoc(doc(db,"grouppreds",me),{name:me,champion:c},{merge:true}); toast("Şampiyon kaydedildi ✓"); }catch(e){ toast("Kaydedilemedi"); console.error(e); }
}
async function saveChampionResult(){
  if(!adminCh){ toast("Seç"); return; }
  try{ await setDoc(doc(db,"meta","tournament"),{champion:adminCh},{merge:true}); toast("Şampiyon sonucu kaydedildi ✓"); }catch(e){ toast("Kaydedilemedi"); console.error(e); }
}
function renderBracket(){
  if($("app").classList.contains("hidden")) return;
  const open = new Date() < GROUP_DEADLINE;
  const myCh = champPick || (groupPredsAll[me]&&groupPredsAll[me].champion) || null;
  const actualCh = (metaAll.tournament&&metaAll.tournament.champion) || null;
  const all=[]; for(const G in GROUPS) GROUPS[G].forEach(t=>all.push(t));
  const son = GROUP_DEADLINE.toLocaleDateString("tr-TR",{day:"numeric",month:"long"});
  let html=`<div class="sectitle">Şampiyon Tahmini</div><p>${open?`Kupayı kim kaldırır? Bir takım seç — doğru bilene <b>+${CONFIG.championPts}</b>. Son tarih: ${son}.`:"Şampiyon tahmini kilitlendi."}</p>`;
  html+=`<div class="cgrid">`;
  all.forEach(t=>{
    const sel=myCh===t.n, win=actualCh&&actualCh===t.n;
    html+=`<div class="cteam ${sel?'csel':''} ${win?'cwin':''} ${open?'ctap':''}" ${open?`data-ch="${t.n}"`:""}><span class="gflag">${t.f}</span><span>${t.n}</span></div>`;
  });
  html+=`</div>`;
  if(open) html+=`<div class="saverow"><button class="btn-grad" data-chsave ${myCh?"":"disabled"}>Şampiyonu Kaydet</button></div>`;
  if(actualCh) html+=`<div class="card" style="text-align:center;margin-top:12px">🏆 Şampiyon: <b>${actualCh}</b> · ${myCh===actualCh?`<span style="color:var(--g1);font-weight:800">bildin +${CONFIG.championPts}</span>`:"bilemedin"}</div>`;
  if(isAdmin()){
    html+=`<div class="sectitle" style="font-size:18px">🛠️ Yönetici — Şampiyon</div><p>Turnuva bitince gerçek şampiyonu seç.</p><div class="cgrid">`;
    all.forEach(t=>{ const sel=(adminCh||actualCh)===t.n; html+=`<div class="cteam ${sel?'csel':''} ctap" data-ach="${t.n}"><span class="gflag">${t.f}</span><span>${t.n}</span></div>`; });
    html+=`</div><div class="saverow"><button class="btn-grad" data-achsave style="background:linear-gradient(135deg,var(--blue),#7b6bff);color:#fff" ${(adminCh||actualCh)?"":"disabled"}>Sonucu Kaydet</button></div>`;
  }
  html+=`<div class="card" style="border-color:rgba(245,197,24,.3);margin-top:14px"><div style="color:var(--gold);font-size:13px;line-height:1.7">⏳ <b>Tur tahminleri (kim tur atlar)</b> — Son 32 eşleşmeleri belli olunca (grup bitince) burada açılacak. Her turda ilerleyeni seçeceksin; tutturduğun her takım için puan (Son 32 +${CONFIG.advancePts.r32}, Son 16 +${CONFIG.advancePts.r16}, Çeyrek +${CONFIG.advancePts.qf}, Yarı +${CONFIG.advancePts.sf}).</div></div>`;
  $("view-bracket").innerHTML=html;
  document.querySelectorAll("[data-ch]").forEach(el=>el.onclick=()=>{ champPick=el.dataset.ch; renderBracket(); });
  const cs=document.querySelector("[data-chsave]"); if(cs) cs.onclick=saveChampion;
  document.querySelectorAll("[data-ach]").forEach(el=>el.onclick=()=>{ adminCh=el.dataset.ach; renderBracket(); });
  const as=document.querySelector("[data-achsave]"); if(as) as.onclick=saveChampionResult;
}

/* ===== TOAST + BAŞLAT ===== */
let tT; function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(tT); tT=setTimeout(()=>t.classList.remove("show"),1800); }
if(me) start();
</script>
